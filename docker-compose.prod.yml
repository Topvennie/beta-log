services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgress
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ${DB_DIR}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  beta-log:
    image: ghcr.io/topvennie/beta-log:latest
    env_file: .env
    ports:
      - 3000:3000
    volumes:
      - ${LOG_DIR}:/app/logs
    depends_on:
      db:
        condition: service_healthy
